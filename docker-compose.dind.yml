services:
  onecli-postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ONECLI_POSTGRES_USER:?run gen_env.sh first}
      POSTGRES_PASSWORD: ${ONECLI_POSTGRES_PASSWORD:?run gen_env.sh first}
      POSTGRES_DB: ${ONECLI_POSTGRES_DB:?run gen_env.sh first}
    volumes:
      - onecli-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 10

  onecli:
    build:
      context: ./onecli
      dockerfile: docker/Dockerfile
    image: nanoclaw-onecli-compose:latest
    restart: unless-stopped
    depends_on:
      onecli-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${ONECLI_POSTGRES_USER:?run gen_env.sh first}:${ONECLI_POSTGRES_PASSWORD:?run gen_env.sh first}@onecli-postgres:5432/${ONECLI_POSTGRES_DB:?run gen_env.sh first}
      NEXTAUTH_SECRET: ""
      NEXT_PUBLIC_APP_URL: http://localhost:10254
      NEXT_PUBLIC_API_URL: http://localhost:10255
      APP_URL: http://localhost:10254
      API_BASE_URL: localhost:10255
      GATEWAY_BASE_URL: host.docker.internal:10255
    env_file:
      - path: .env
        required: true
    ports:
      - "127.0.0.1:10254:10254"
      - "0.0.0.0:10255:10255"
    entrypoint: ["/app/onecli-entrypoint.sh"]
    volumes:
      - ./res/onecli-entrypoint.sh:/app/onecli-entrypoint.sh:ro
      - onecli-app-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:10254/api/health >/dev/null && wget -qO- http://127.0.0.1:10255/healthz >/dev/null" ]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6

  # Dedicated Docker-in-Docker daemon. nanoclaw and all agent containers run
  # against this daemon, which has the same volume paths as nanoclaw itself —
  # no path-rewriting shims needed.
  dind:
    build:
      dockerfile_inline: |
        FROM docker:27-dind
        RUN apk add --no-cache socat
        RUN cat <<'EOF' > /entrypoint.sh
        #!/bin/sh
        set -e
        socat TCP-LISTEN:10255,fork,reuseaddr TCP:onecli:10255 &
        dockerd-entrypoint.sh &
        until docker -H tcp://127.0.0.1:2375 info >/dev/null 2>&1; do sleep 1; done
        docker -H tcp://127.0.0.1:2375 build \
          --build-arg INSTALL_CJK_FONTS=$$INSTALL_CJK_FONTS \
          -t $$NANOCLAW_AGENT_IMAGE \
          /home/user/nanoclaw/container
        wait
        EOF
        RUN chmod +x /entrypoint.sh
        ENTRYPOINT ["/entrypoint.sh"]
    privileged: true
    restart: unless-stopped
    environment:
      DOCKER_TLS_CERTDIR: ""  # plain tcp://dind:2375, no TLS
      INSTALL_CJK_FONTS: ${INSTALL_CJK_FONTS:-false}
      NANOCLAW_AGENT_IMAGE: ${NANOCLAW_AGENT_IMAGE:-nanoclaw-agent-compose:latest}
    volumes:
      - dind-storage:/var/lib/docker
      # Mirror every path that nanoclaw may pass as a -v source so that dind
      # can resolve them when creating agent containers.
      - ./nanoclaw:/home/user/nanoclaw:ro
      - nanoclaw-data:/home/user/nanoclaw/data
      - nanoclaw-groups:/home/user/nanoclaw/groups
      - nanoclaw-store:/home/user/nanoclaw/store
      - nanoclaw-logs:/home/user/nanoclaw/logs
      # onecli SDK writes CA cert files to nanoclaw's /tmp and passes them as
      # volume mounts to agent containers. Share the volume so dind can find them.
      - nanoclaw-tmp:/tmp
    healthcheck:
      # Passes only after dockerd is up AND the agent image has been built.
      test: ["CMD-SHELL", "docker -H tcp://127.0.0.1:2375 image inspect ${NANOCLAW_AGENT_IMAGE:-nanoclaw-agent-compose:latest} >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      start_period: 600s
      retries: 12


  nanoclaw:
    build:
      context: ./nanoclaw
      dockerfile_inline: |
        FROM node:22-slim

        ENV PNPM_HOME="/pnpm"
        ENV PATH="$${PNPM_HOME}:$${PATH}"

        RUN apt-get update && apt-get install -y --no-install-recommends \
            ca-certificates \
            docker.io \
            gosu \
            git \
            g++ \
            make \
            python3 \
          && rm -rf /var/lib/apt/lists/*

        # Thin wrapper: injects ANTHROPIC_BASE_URL and model-override env vars
        # into every `docker run` call so agent containers hit api.z.ai via the
        # onecli proxy. Path rewriting is not needed with DinD (paths are
        # identical inside dind).
        RUN mv /usr/bin/docker /usr/bin/docker-real && cat > /usr/local/bin/docker <<'EOF'
        #!/bin/sh
        set -eu
        if [ "$${1:-}" = "run" ]; then
          tmp="$$(mktemp)"
          trap 'rm -f "$$tmp"' EXIT
          printf '%s\n' "run" > "$$tmp"
          shift
          append_env() {
            name="$$1"
            eval "value=\$${$$name:-}"
            if [ -n "$$value" ]; then
              printf '%s\n%s=%s\n' "-e" "$$name" "$$value" >> "$$tmp"
            fi
          }
          append_env ANTHROPIC_BASE_URL
          append_env API_TIMEOUT_MS
          append_env CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
          append_env ANTHROPIC_DEFAULT_OPUS_MODEL
          append_env ANTHROPIC_DEFAULT_SONNET_MODEL
          append_env ANTHROPIC_DEFAULT_HAIKU_MODEL
          append_env CLAUDE_CODE_SUBAGENT_MODEL
          while [ "$$#" -gt 0 ]; do
            printf '%s\n' "$$1" >> "$$tmp"
            shift
          done
          set --
          while IFS= read -r arg; do set -- "$$@" "$$arg"; done < "$$tmp"
        fi
        exec /usr/bin/docker-real "$$@"
        EOF
        RUN chmod +x /usr/local/bin/docker

        RUN corepack enable && corepack prepare pnpm@10.33.0 --activate

        WORKDIR /home/user/nanoclaw
    depends_on:
      onecli:
        condition: service_healthy
      dind:
        condition: service_healthy
    command: >
      sh -lc "chown -R node:node
      /home/user/nanoclaw/data /home/user/nanoclaw/groups /home/user/nanoclaw/store
      /home/user/nanoclaw/logs /home/user/nanoclaw/node_modules /home/user/nanoclaw/dist
      /home/user/nanoclaw/.pnpm-store /tmp /pnpm;
      exec gosu node sh -lc 'pnpm install --frozen-lockfile && pnpm run build && exec pnpm start'"
    environment:
      CONTAINER_IMAGE: ${NANOCLAW_AGENT_IMAGE:-nanoclaw-agent-compose:latest}
      CONTAINER_IMAGE_BASE: ${NANOCLAW_AGENT_IMAGE_BASE:-nanoclaw-agent-compose}
      DOCKER_HOST: tcp://dind:2375
      HUSKY: "0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ONECLI_URL: ${ONECLI_URL:-http://onecli:10254}
      ONECLI_API_KEY: ${ONECLI_API_KEY:-}
      TZ: ${TZ:-UTC}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      API_TIMEOUT_MS: ${API_TIMEOUT_MS:-}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      CLAUDE_CODE_SUBAGENT_MODEL: ${CLAUDE_CODE_SUBAGENT_MODEL:-}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./nanoclaw:/home/user/nanoclaw
      - nanoclaw-data:/home/user/nanoclaw/data
      - nanoclaw-groups:/home/user/nanoclaw/groups
      - nanoclaw-store:/home/user/nanoclaw/store
      - nanoclaw-logs:/home/user/nanoclaw/logs
      - nanoclaw-node-modules:/home/user/nanoclaw/node_modules
      - nanoclaw-dist:/home/user/nanoclaw/dist
      - nanoclaw-pnpm-project-store:/home/user/nanoclaw/.pnpm-store
      - nanoclaw-tmp:/tmp
      - nanoclaw-pnpm-store:/pnpm/store
    restart: unless-stopped

volumes:
  onecli-postgres-data:
  onecli-app-data:
  dind-storage:
  nanoclaw-data:
    name: nanoclaw-data
  nanoclaw-groups:
    name: nanoclaw-groups
  nanoclaw-store:
    name: nanoclaw-store
  nanoclaw-logs:
    name: nanoclaw-logs
  nanoclaw-tmp:
    name: nanoclaw-tmp
  nanoclaw-node-modules:
  nanoclaw-dist:
  nanoclaw-pnpm-project-store:
  nanoclaw-pnpm-store:
